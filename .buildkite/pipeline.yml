steps:
  - label: ":golang: Build"
    command:
      - "cd hello && go build -o ../hello-bin ."
      - "buildkite-agent artifact upload hello-bin"
    plugins:
      - docker#v5.3.0:
          image: "golang:1.18.0"
          workdir: /workspace
          mount-buildkite-agent: true

  - block: ":wave: Enter Your Name"
    fields:
      - text: "What is your name?"
        key: "user-name"

  - label: ":rocket: Run"
    command:
      - "buildkite-agent artifact download hello-bin ."
      - "chmod +x hello-bin"
      - "NAME=$(buildkite-agent meta-data get user-name)"
      - "./hello-bin $NAME"