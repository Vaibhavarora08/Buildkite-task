steps:
  - label: ":golang: Build"
    command:
      - "cd hello && go build -o ../hello-bin ."
      - "buildkite-agent artifact upload /workspace/hello-bin"
    plugins:
      - docker#v5.3.0:
          image: "golang:1.18.0"
          workdir: /workspace
          mount-buildkite-agent: true

  - block: ":wave: Enter Your Name"
    fields:
      - text: "What is your name?"
        key: "user-name"

  - label: ":rocket: Run"
    command:
      - |
        buildkite-agent artifact download workspace/hello-bin .
        chmod +x workspace/hello-bin
        NAME=$$(buildkite-agent meta-data get user-name)
        ./workspace/hello-bin "$$NAME"